# Static base compose. The install script does NOT rewrite this file — it drives
# everything through .env interpolation (domain, paths, secrets), versions.env
# (image tags, exported into the env), and COMPOSE_PROFILES (which optional
# services run). Optional services carry a `profiles:` key and only start when
# their profile is active. Core services (traefik/postgres/redis/nextcloud/cron)
# have no profile and always run.
#
# TLS: the Traefik command below uses Cloudflare DNS-01. For the HTTP-01 fallback
# the script layers compose.tls-http.yaml, which replaces the Traefik command.
name: ${PROJECT_NAME:-nextcloud}

networks:
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: ${FRONTEND_SUBNET}
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: ${BACKEND_SUBNET}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:

  traefik:
    image: traefik:${TRAEFIK_VERSION}
    container_name: ${PROJECT_NAME:-nextcloud}-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.dnschallenge=true
      - --certificatesresolvers.le.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --log.level=INFO
    environment:
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DATA_ROOT}/traefik/letsencrypt:/letsencrypt
    networks: [frontend]
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`${TRAEFIK_HOST}`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls.certresolver=le
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.middlewares=traefik-auth
      - traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}
    logging: *default-logging

  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: ${PROJECT_NAME:-nextcloud}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${DATA_ROOT}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 2g
    networks: [backend]
    logging: *default-logging

  redis:
    image: redis:${REDIS_VERSION}
    container_name: ${PROJECT_NAME:-nextcloud}-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ${DATA_ROOT}/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    networks: [backend]
    logging: *default-logging

  nextcloud:
    image: nextcloud:${NEXTCLOUD_VERSION}
    container_name: ${PROJECT_NAME:-nextcloud}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_HOST_PASSWORD: ${REDIS_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${CLOUD_HOST}
      OVERWRITEPROTOCOL: https
      OVERWRITEHOST: ${CLOUD_HOST}
      OVERWRITECLIURL: https://${CLOUD_HOST}
      TRUSTED_PROXIES: ${FRONTEND_SUBNET} ${BACKEND_SUBNET}
      PHP_MEMORY_LIMIT: 1024M
      PHP_UPLOAD_LIMIT: 16G
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: tls
      SMTP_NAME: ${SMTP_NAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_DOMAIN: ${MAIL_DOMAIN}
    volumes:
      - nextcloud_html:/var/www/html
      - ${DATA_ROOT}/nextcloud/config:/var/www/html/config
      - ${DATA_ROOT}/nextcloud/custom_apps:/var/www/html/custom_apps
      - ${DATA_ROOT}/nextcloud/data:/var/www/html/data
      - ${DATA_ROOT}/nextcloud/themes:/var/www/html/themes
    mem_limit: 4g
    networks: [frontend, backend]
    labels:
      - traefik.enable=true
      - traefik.http.routers.nextcloud.rule=Host(`${CLOUD_HOST}`)
      - traefik.http.routers.nextcloud.entrypoints=websecure
      - traefik.http.routers.nextcloud.tls.certresolver=le
      - traefik.http.routers.nextcloud.middlewares=sec-headers
      - traefik.http.services.nextcloud.loadbalancer.server.port=80
      - traefik.docker.network=${PROJECT_NAME:-nextcloud}_frontend
      - traefik.http.middlewares.sec-headers.headers.stsSeconds=15552000
      - traefik.http.middlewares.sec-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.sec-headers.headers.stsPreload=true
      - traefik.http.middlewares.sec-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.sec-headers.headers.referrerPolicy=no-referrer
    logging: *default-logging

  cron:
    image: nextcloud:${NEXTCLOUD_VERSION}
    container_name: ${PROJECT_NAME:-nextcloud}-cron
    restart: unless-stopped
    entrypoint: /cron.sh
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - nextcloud_html:/var/www/html
      - ${DATA_ROOT}/nextcloud/config:/var/www/html/config
      - ${DATA_ROOT}/nextcloud/custom_apps:/var/www/html/custom_apps
      - ${DATA_ROOT}/nextcloud/data:/var/www/html/data
      - ${DATA_ROOT}/nextcloud/themes:/var/www/html/themes
    mem_limit: 1g
    networks: [backend]
    logging: *default-logging

  # ── optional: Collabora (Nextcloud Office) ── profile: collabora
  collabora:
    image: collabora/code:${COLLABORA_VERSION}
    container_name: ${PROJECT_NAME:-nextcloud}-collabora
    profiles: [collabora]
    restart: unless-stopped
    cap_add: [MKNOD]
    environment:
      aliasgroup1: https://${CLOUD_HOST}:443
      extra_params: --o:ssl.enable=false --o:ssl.termination=true
      username: ${COLLABORA_USERNAME}
      password: ${COLLABORA_PASSWORD}
    networks: [frontend]
    labels:
      - traefik.enable=true
      - traefik.http.routers.collabora.rule=Host(`${OFFICE_HOST}`)
      - traefik.http.routers.collabora.entrypoints=websecure
      - traefik.http.routers.collabora.tls.certresolver=le
      - traefik.http.services.collabora.loadbalancer.server.port=9980
    mem_limit: 5g
    logging: *default-logging

  # ── optional: Talk HPB (aio-talk standalone) ── profile: hpb
  # TALK_PORT MUST be 3478 (the TURN port). Signaling is fixed on container 8081.
  talk:
    image: nextcloud/aio-talk:${AIO_TALK_VERSION}
    container_name: ${PROJECT_NAME:-nextcloud}-talk
    profiles: [hpb]
    restart: unless-stopped
    environment:
      NC_DOMAIN: ${CLOUD_HOST}
      TALK_HOST: ${SIGNAL_HOST}
      TALK_PORT: 3478
      TURN_SECRET: ${TURN_SECRET}
      SIGNALING_SECRET: ${SIGNALING_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
    networks: [frontend]
    labels:
      - traefik.enable=true
      - traefik.http.routers.signaling.rule=Host(`${SIGNAL_HOST}`) && PathPrefix(`/standalone-signaling`)
      - traefik.http.routers.signaling.entrypoints=websecure
      - traefik.http.routers.signaling.tls.certresolver=le
      - traefik.http.routers.signaling.middlewares=signaling-strip
      - traefik.http.middlewares.signaling-strip.stripprefix.prefixes=/standalone-signaling
      - traefik.http.services.signaling.loadbalancer.server.port=8081
      - traefik.docker.network=${PROJECT_NAME:-nextcloud}_frontend
    mem_limit: 2g
    logging: *default-logging

  # ── optional: Elasticsearch (full-text search) ── profile: fulltext
  # Needs host sysctl vm.max_map_count=262144 (the script sets it).
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTICSEARCH_VERSION}
    container_name: ${PROJECT_NAME:-nextcloud}-elasticsearch
    profiles: [fulltext]
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      bootstrap.memory_lock: "true"
      ES_JAVA_OPTS: -Xms2g -Xmx2g
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - ${DATA_ROOT}/elasticsearch:/usr/share/elasticsearch/data
    mem_limit: 4g
    networks: [backend]
    logging: *default-logging

  # ── optional: ClamAV (on-access antivirus) ── profile: antivirus
  clamav:
    image: clamav/clamav:${CLAMAV_VERSION}
    container_name: ${PROJECT_NAME:-nextcloud}-clamav
    profiles: [antivirus]
    restart: unless-stopped
    volumes:
      - ${DATA_ROOT}/clamav:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck.sh || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    mem_limit: 3g
    networks: [backend]
    logging: *default-logging

  # ── optional: Client Push (notify_push) ── profile: push
  # The push binary ships inside the notify_push app, so the script installs the
  # app (occ app:install notify_push) BEFORE starting this service.
  notify_push:
    image: nextcloud:${NEXTCLOUD_VERSION}
    container_name: ${PROJECT_NAME:-nextcloud}-notify-push
    profiles: [push]
    restart: unless-stopped
    entrypoint: ["/var/www/html/custom_apps/notify_push/bin/${NOTIFY_PUSH_ARCH}/notify_push", "/var/www/html/config/config.php"]
    environment:
      NEXTCLOUD_URL: http://nextcloud
      PORT: "7867"
    depends_on:
      nextcloud:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - nextcloud_html:/var/www/html
      - ${DATA_ROOT}/nextcloud/config:/var/www/html/config
      - ${DATA_ROOT}/nextcloud/custom_apps:/var/www/html/custom_apps
      - ${DATA_ROOT}/nextcloud/data:/var/www/html/data
      - ${DATA_ROOT}/nextcloud/themes:/var/www/html/themes
    networks: [frontend, backend]
    labels:
      - traefik.enable=true
      - traefik.http.routers.push.rule=Host(`${CLOUD_HOST}`) && PathPrefix(`/push`)
      - traefik.http.routers.push.entrypoints=websecure
      - traefik.http.routers.push.tls.certresolver=le
      - traefik.http.routers.push.middlewares=push-strip
      - traefik.http.middlewares.push-strip.stripprefix.prefixes=/push
      - traefik.http.services.push.loadbalancer.server.port=7867
      - traefik.docker.network=${PROJECT_NAME:-nextcloud}_frontend
    mem_limit: 256m
    logging: *default-logging

volumes:
  nextcloud_html:
